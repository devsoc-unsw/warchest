version: "2"

run:
  timeout: 5m

output:
  print-linter-name: true
  print-issued-lines: true
  formats:
    colored-line-number:
      path: stdout

issues:
  exclude-dirs:
    - vendor
    - testdata
    - third_party$
    - builtin$
    - examples$

formatters:
  enable:
    - gofmt
    - goimports

linters:
  disable-all: true
  enable:
    - bodyclose
    - errcheck
    - funlen
    - govet
    - ineffassign
    - lll
    - misspell
    - staticcheck
    - unused

linters-settings:
  funlen:
    lines: 88
  govet:
    enable:
      - shadow
  lll:
    line-length: 88
    tab-width: 4
  misspell:
    locale: UK

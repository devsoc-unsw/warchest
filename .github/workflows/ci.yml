name: Full Stack CI Pipeline # Updated the name since this handles Go now too!

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Frontend (Runs First)
  # ==========================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install TypeScript Dependencies
        run: bun install --frozen-lockfile

      - name: Check TypeScript Lint
        run: bun run lint

      - name: Check TypeScript Compile
        run: bun run build

      - name: Run TypeScript Tests
        run: bun run test

      - name: Verify Frontend Docker Build
        run: docker build -t frontend-test .

  # ==========================================
  # JOB 2: Backend (Waits for Frontend)
  # ==========================================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Go Dependencies
        run: go mod download

      - name: Install Dingo
        run: go install github.com/MadAppGang/dingo/cmd/dingo@latest

      - name: Run Dingo Lint
        run: dingo lint ./...

      - name: Transpile .dingo files to .go
        run: dingo go ./...

      # - name: Check Go Lint
      #   uses: golangci/golangci-lint-action@v9
      #   with:
      #     version: latest
      #     args: --timeout=5m
      #     working-directory: backend

      - name: Run Go Tests
        run: go test -v ./...
        working-directory: ./backend

      - name: Verify Backend Docker Build
        run: docker build -t backend-test .

  # ==========================================
  # JOB 3: Money Module (Waits for Frontend)
  # ==========================================
  money-module:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./money-module
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Dingo
        run: go install github.com/MadAppGang/dingo/cmd/dingo@latest
      
      - name: Download Dependencies
        run: go mod download

      - name: Run Dingo Lint
        run: dingo lint ./...

      - name: Transpile .dingo files to .go
        run: dingo go ./...

      - name: Install Go Dependencies
        run: go mod download

      # - name: Check Go Lint
      #   uses: golangci/golangci-lint-action@v9
      #   with:
      #     version: latest
      #     args: --timeout=5m
      #     working-directory: money-module 

      - name: Run Go Tests
        run: go test -v ./...
        working-directory: ./money-module
      - name: Verify Money Module Docker Build
        run: docker build -t money-module-test .

services:
  warchest-dev-container:
    container_name: warchest-dev-container
    image: ghcr.io/devsoc-unsw/warchest-devcontainer
    stdin_open: true
    tty: true
    ports:
      # expose ports (3000 computer <-> 3000 on the container)
      - "3000:3000"
    volumes:
      - ./:/root/warchest
    security_opt:
      - seccomp:unconfined
    environment:
      - NODE_ENV=development
      - BE_DATABASE_URL=postgres://postgres:password@postgres-be:5432/warchest
      - MM_DATABASE_URL=postgres://postgres:password@postgres-mm:5432/money_module
      - TIGERBEETLE_ADDRESS=172.20.0.10:3000
    networks:
      - warchest-network
    depends_on:
      postgres-be:
        condition: service_healthy
      postgres-mm:
        condition: service_healthy
      tigerbeetle:
        condition: service_started

  postgres-be:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: warchest
    networks:
      - warchest-network
    volumes:
      - postgres_be_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-mm:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: money_module
    networks:
      - warchest-network
    volumes:
      - postgres_mm_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle
    entrypoint: ["/bin/sh"]
    command: "/start.sh"
    networks:
      warchest-network:
        ipv4_address: 172.20.0.10
    volumes:
      - tigerbeetle_data:/data
      - ./money-module/tigerbeetle/start.sh:/start.sh
    security_opt:
      - seccomp:unconfined

volumes:
  postgres_be_data:
  postgres_mm_data:
  tigerbeetle_data:

networks:
  warchest-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24 # Define the range (e.g., 172.20.0.1 to 172.20.0.254)
